# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  Budget Bit — CI Pipeline                                                    ║
# ║  Runs on: Every push and pull request to main/develop                       ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'

jobs:
  # ── Client (React) ────────────────────────────────────────────────────────────
  client:
    name: Client Tests & Build
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./client

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
        continue-on-error: false

      - name: Run tests
        run: npm run test -- --run
        continue-on-error: false

      - name: Build
        run: npm run build
        continue-on-error: false

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: github.ref == 'refs/heads/main'
        with:
          name: client-build
          path: client/dist
          retention-days: 7

  # ── AI Service (FastAPI) ──────────────────────────────────────────────────────
  ai-service:
    name: AI Service Tests
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./ai

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: ai/requirements.txt

      - name: Create venv
        run: python -m venv .venv

      - name: Install dependencies
        run: |
          source .venv/bin/activate
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: Python syntax check
        run: |
          source .venv/bin/activate
          python -m py_compile main.py routers/ocr.py routers/score.py routers/recommend.py

      - name: Run tests
        run: |
          source .venv/bin/activate
          pytest tests/ -v

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: github.ref == 'refs/heads/main'
        with:
          files: ./ai/coverage.xml
          flags: unittests

  # ── Docker Build (all services) ──────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [client, ai-service]
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Client
        uses: docker/build-push-action@v5
        with:
          context: ./client
          file: ./client/Dockerfile
          push: false
          tags: budget-bit-client:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build AI Service
        uses: docker/build-push-action@v5
        with:
          context: ./ai
          file: ./ai/Dockerfile
          push: false
          tags: budget-bit-ai:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
