# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  Budget Bit — CD Pipeline (Deployment)                                      ║
# ║  Runs on: Push to main branch                                               ║
# ║  Deploys to: Container Registry (ready for K8s/Docker Compose)             ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

name: CD

on:
  push:
    branches: [main]
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_CLIENT: ${{ github.repository_owner }}/budget-bit-client
  IMAGE_NAME_AI: ${{ github.repository_owner }}/budget-bit-ai

jobs:
  # ── Build & Push Images ────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (Client)
        id: meta-client
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_CLIENT }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=

      - name: Build and push Client
        uses: docker/build-push-action@v5
        with:
          context: ./client
          file: ./client/Dockerfile
          push: true
          tags: ${{ steps.meta-client.outputs.tags }}
          labels: ${{ steps.meta-client.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_SUPABASE_URL=${{ vars.VITE_SUPABASE_URL }}
            VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}
            VITE_AI_BASE_URL=${{ vars.VITE_AI_BASE_URL }}

      - name: Extract metadata (AI)
        id: meta-ai
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_AI }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=

      - name: Build and push AI Service
        uses: docker/build-push-action@v5
        with:
          context: ./ai
          file: ./ai/Dockerfile
          push: true
          tags: ${{ steps.meta-ai.outputs.tags }}
          labels: ${{ steps.meta-ai.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            SUPABASE_URL=${{ vars.SUPABASE_URL }}
            SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }}

  # ── Generate Deployment Manifest ────────────────────────────────────────────────
  deployment:
    name: Generate Deployment Info
    runs-on: ubuntu-latest
    needs: build-and-push
    outputs:
      client-image: ${{ steps.meta.outputs.client-image }}
      ai-image: ${{ steps.meta.outputs.ai-image }}
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set outputs
        id: meta
        run: |
          echo "client-image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_CLIENT }}" >> $GITHUB_OUTPUT
          echo "ai-image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_AI }}" >> $GITHUB_OUTPUT
          echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT

      - name: Create deployment summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Images:**" >> $GITHUB_STEP_SUMMARY
          echo "- Client: \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME_CLIENT }}:${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- AI: \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME_AI }}:${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Deployment files updated.** Add your deployment target (Railway, Fly.io, etc.) configuration." >> $GITHUB_STEP_SUMMARY
